# SonarCloud: use CI analysis only (NOT "Automatic Analysis" — multi-language repos fail that mode).
#
# One secret in GitHub: Settings → Secrets → Actions → SONAR_TOKEN
#   (SonarCloud → Account avatar → My Account → Security → Generate token)
#
# In SonarCloud: open project shadenc_test3 → Administration → Analysis Method →
#   choose "GitHub Actions" / turn OFF Automatic Analysis if it keeps failing.

name: SonarCloud

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
