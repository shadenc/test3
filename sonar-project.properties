# SonarCloud — CI analysis (GitHub Actions). Automatic Analysis is disabled for this repo type (Python + JS).
# Matches GitHub repo: shadenc/test3 → default SonarCloud keys when imported from GitHub:
sonar.organization=shadenc
sonar.projectKey=shadenc_test3
sonar.projectName=Saudi Investment Analyzer

sonar.host.url=https://sonarcloud.io

sonar.sources=src,frontend/src
sonar.tests=tests,frontend/src
sonar.test.inclusions=tests/**/*.py,frontend/src/**/*.test.js,frontend/src/**/*.test.jsx,frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx,frontend/src/**/__tests__/**

# Populated by GitHub Actions before scan (see .github/workflows/sonarcloud.yml)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/coverage/**,\
  frontend/build/**,\
  data/**,\
  output/**,\
  **/*.pdf,\
  **/*.db,\
  **/venv/**,\
  **/Foreign Investment/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  frontend/src/**/*.test.js,\
  frontend/src/**/*.test.jsx,\
  frontend/src/**/*.test.ts,\
  frontend/src/**/*.test.tsx,\
  frontend/src/**/__tests__/**

sonar.python.version=3.11
sonar.javascript.node.maxspace=4096
