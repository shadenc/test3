# SonarCloud / SonarQube — organization & projectKey are passed from GitHub Actions secrets
# (see .github/workflows/sonarcloud.yml). For local CLI scan, add:
#   sonar.organization=YOUR_ORG
#   sonar.projectKey=YOUR_ORG_saudi-investment-analyzer

sonar.host.url=https://sonarcloud.io

sonar.sources=src,frontend/src
sonar.tests=frontend/src
sonar.test.inclusions=frontend/src/**/*.test.js,frontend/src/**/*.test.jsx,frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx,frontend/src/**/__tests__/**

sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/coverage/**,\
  frontend/build/**,\
  data/**,\
  output/**,\
  **/*.pdf,\
  **/*.db,\
  **/venv/**,\
  **/Foreign Investment/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  frontend/src/**/*.test.js,\
  frontend/src/**/*.test.jsx,\
  frontend/src/**/*.test.ts,\
  frontend/src/**/*.test.tsx,\
  frontend/src/**/__tests__/**

sonar.python.version=3.11
sonar.javascript.node.maxspace=4096

# Optional: after you run pytest with coverage.xml at repo root, uncomment:
# sonar.python.coverage.reportPaths=coverage.xml
# Optional: frontend LCOV after npm test -- --coverage --watchAll=false
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
